name: cv_maker
description: Aplikasi Pembuat CV untuk Mahasiswa
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.11.1

  # File Management
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  image_picker: ^1.0.5
  flutter_pdfview: ^1.3.2

  # Fonts
  google_fonts: ^6.1.0

  downloadsfolder: ^1.1.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  google_sign_in: ^6.2.1
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/google_logo.png

    - assets/fonts/

  # Fonts
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic