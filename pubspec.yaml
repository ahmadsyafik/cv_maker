name: cv_maker
description: Aplikasi Pembuat CV untuk Mahasiswa
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Flutter SVG
  flutter_svg: ^2.0.9

  # State Management
  provider: ^6.1.1

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.14.3

  # File Management
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  image_picker: ^1.0.5
  flutter_pdfview: ^1.3.2

  # Fonts
  google_fonts: ^6.1.0

  downloadsfolder: ^1.1.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.6.12
  google_sign_in: ^6.2.1
  device_preview: ^1.3.1
  firebase_storage: ^12.4.10
  pdfrx: ^2.2.24

  # HTTP
  http: ^1.2.0

  # Package Info
  package_info_plus: ^8.0.0
  cached_network_image: ^3.4.1
  permission_handler: ^12.0.1
  open_file: ^3.5.11
  file_picker: ^11.0.2
  url_launcher: ^6.3.2
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # ✅ TAMBAHAN ICON
  flutter_launcher_icons: ^0.13.1

# ✅ KONFIGURASI ICON
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"

  # (opsional tapi bagus buat Android modern)
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/google_logo.png
    - assets/fonts/
    - assets/background/background.svg
    - assets/icon/app_icon.png   # ✅ TAMBAHAN

  # Fonts
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic
